name: Local Diffusion CI Results

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci-results:
    name: Build and package CI results
    runs-on: macos-15
    timeout-minutes: 45
    env:
      PROJECT_NAME: LocalDiffusion
      PROJECT: LocalDiffusion.xcodeproj
      SCHEME: LocalDiffusion
      CONFIGURATION: Debug
      DESTINATION: generic/platform=iOS
      NATIVE_BACKEND_RELEASE_TAG: native-backend-current
      NATIVE_BACKEND_ASSET: LocalDiffusionNative.xcframework.zip
      DERIVED_DATA_PATH: .derivedData-ci
      RESULT_BUNDLE_PATH: ci-results/LocalDiffusion.xcresult
      BUILD_LOG_PATH: ci-results/xcodebuild.log
      JUNIT_PATH: ci-results/junit.xml
      FAILURE_SUMMARY_PATH: ci-results/ci-failure-summary.md
      MANIFEST_PATH: ci-results/ci-artifact-manifest.json
      NATIVE_BACKEND_ASSET_METADATA: NativeBackend/StableDiffusionCpp/native-backend-asset.json
      NATIVE_BACKEND_ASSET_LOG_PATH: ci-results/native-backend-asset.log
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      CLANG_MODULE_CACHE_PATH: /tmp/localdiffusion-clang-cache

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare artifact metadata
        run: |
          mkdir -p ci-results
          branch_slug="${GITHUB_REF_NAME//\//-}"
          short_sha="${GITHUB_SHA:0:7}"
          subject="$(git log -1 --pretty=%s)"
          version="unversioned"
          if [[ "${subject}" =~ ^(v[0-9]+(\.[0-9]+)*): ]]; then
            version="${BASH_REMATCH[1]}"
          fi
          {
            echo "VERSION=${version}"
            echo "BRANCH_SLUG=${branch_slug}"
            echo "SHORT_SHA=${short_sha}"
          } >> "${GITHUB_ENV}"
          xcodebuild -version > ci-results/xcode-version.txt 2>&1 || true

      - name: Restore native backend XCFramework
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set +e
          mkdir -p ci-results
          asset_outcome="failure"
          asset_expected_sha=""
          asset_actual_sha=""
          asset_env_path="ci-results/native-backend-asset.env"

          write_asset_env() {
            {
              echo "NATIVE_BACKEND_ASSET_OUTCOME=${asset_outcome}"
              echo "NATIVE_BACKEND_ASSET_EXPECTED_SHA=${asset_expected_sha}"
              echo "NATIVE_BACKEND_ASSET_ACTUAL_SHA=${asset_actual_sha}"
            } > "${asset_env_path}"
          }

          {
            echo "Native backend asset metadata: ${NATIVE_BACKEND_ASSET_METADATA}"
            echo "Release tag: ${NATIVE_BACKEND_RELEASE_TAG}"
            echo "Asset name: ${NATIVE_BACKEND_ASSET}"
          } > "${NATIVE_BACKEND_ASSET_LOG_PATH}"

          if [[ ! -f "${NATIVE_BACKEND_ASSET_METADATA}" ]]; then
            echo "Missing native backend asset metadata file." | tee ci-results/native-backend-restore.log
            echo "FAIL: metadata file is missing." >> "${NATIVE_BACKEND_ASSET_LOG_PATH}"
            write_asset_env
            exit 0
          fi

          asset_expected_sha="$(python3 -c 'import json,sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["sha256"])' "${NATIVE_BACKEND_ASSET_METADATA}" 2>>"${NATIVE_BACKEND_ASSET_LOG_PATH}")"
          if [[ -z "${asset_expected_sha}" ]]; then
            echo "Could not read expected SHA-256 from metadata." | tee ci-results/native-backend-restore.log
            echo "FAIL: expected SHA-256 is empty." >> "${NATIVE_BACKEND_ASSET_LOG_PATH}"
            write_asset_env
            exit 0
          fi
          echo "Expected SHA-256: ${asset_expected_sha}" >> "${NATIVE_BACKEND_ASSET_LOG_PATH}"

          if [[ -d "LocalDiffusion/Frameworks/LocalDiffusionNative.xcframework" ]]; then
            asset_outcome="skipped-existing-xcframework"
            echo "Native backend XCFramework already exists in checkout." | tee ci-results/native-backend-restore.log
            echo "SKIP: existing XCFramework found; no zip downloaded." >> "${NATIVE_BACKEND_ASSET_LOG_PATH}"
            write_asset_env
            exit 0
          fi

          mkdir -p /tmp/localdiffusion-native-backend LocalDiffusion/Frameworks
          gh release download "${NATIVE_BACKEND_RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${NATIVE_BACKEND_ASSET}" \
            --dir /tmp/localdiffusion-native-backend > ci-results/native-backend-restore.log 2>&1
          download_status=$?
          asset_path="/tmp/localdiffusion-native-backend/${NATIVE_BACKEND_ASSET}"
          if [[ "${download_status}" -ne 0 || ! -f "${asset_path}" ]]; then
            echo "FAIL: release asset download failed with exit ${download_status}." >> "${NATIVE_BACKEND_ASSET_LOG_PATH}"
            write_asset_env
            exit 0
          fi

          asset_actual_sha="$(shasum -a 256 "${asset_path}" | awk '{print $1}')"
          echo "Actual SHA-256: ${asset_actual_sha}" >> "${NATIVE_BACKEND_ASSET_LOG_PATH}"
          if [[ "${asset_actual_sha}" != "${asset_expected_sha}" ]]; then
            echo "FAIL: SHA-256 mismatch; not unpacking native backend." >> "${NATIVE_BACKEND_ASSET_LOG_PATH}"
            write_asset_env
            exit 0
          fi

          unzip -q "${asset_path}" -d LocalDiffusion/Frameworks >> ci-results/native-backend-restore.log 2>&1
          unzip_status=$?
          if [[ "${unzip_status}" -eq 0 && -d "LocalDiffusion/Frameworks/LocalDiffusionNative.xcframework" ]]; then
            asset_outcome="success"
            echo "PASS: release asset SHA-256 matched metadata." >> "${NATIVE_BACKEND_ASSET_LOG_PATH}"
          else
            echo "FAIL: unzip failed with exit ${unzip_status} or XCFramework was not produced." >> "${NATIVE_BACKEND_ASSET_LOG_PATH}"
          fi
          write_asset_env

      - name: Run validation commands
        id: validate
        shell: bash
        run: |
          set +e

          swift_sources=(
            LocalDiffusion/App/LocalDiffusionApp.swift
            LocalDiffusion/Inference/ImageGenerationBackend.swift
            LocalDiffusion/Models/AppModels.swift
            LocalDiffusion/Services/AppFileStore.swift
            LocalDiffusion/Services/HuggingFaceDownloadManager.swift
            LocalDiffusion/ViewModels/GenerationViewModel.swift
            LocalDiffusion/Views/Gallery/GalleryView.swift
            LocalDiffusion/Views/Generation/GenerationView.swift
            LocalDiffusion/Views/Models/ModelLibraryView.swift
            LocalDiffusion/Views/Prompts/PromptLibraryView.swift
            LocalDiffusion/Views/RootContentView.swift
            LocalDiffusion/Views/Shared/ParameterEditor.swift
          )

          swiftc_bin="/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin/swiftc"
          iphoneos_sdk="/Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk"

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            git diff --check HEAD^ HEAD > ci-results/git-diff-check.log 2>&1
          else
            git diff --check > ci-results/git-diff-check.log 2>&1
          fi
          status_git_diff=$?

          plutil -lint LocalDiffusion.xcodeproj/project.pbxproj > ci-results/plutil.log 2>&1
          status_plutil=$?

          status_native_backend_asset=1
          export NATIVE_BACKEND_ASSET_OUTCOME="missing-log"
          export NATIVE_BACKEND_ASSET_EXPECTED_SHA=""
          export NATIVE_BACKEND_ASSET_ACTUAL_SHA=""
          if [[ -f "ci-results/native-backend-asset.env" ]]; then
            source ci-results/native-backend-asset.env
            export NATIVE_BACKEND_ASSET_OUTCOME
            export NATIVE_BACKEND_ASSET_EXPECTED_SHA
            export NATIVE_BACKEND_ASSET_ACTUAL_SHA
          fi
          if [[ "${NATIVE_BACKEND_ASSET_OUTCOME}" == "success" || "${NATIVE_BACKEND_ASSET_OUTCOME}" == "skipped-existing-xcframework" ]]; then
            status_native_backend_asset=0
          fi

          "${swiftc_bin}" -parse \
            -target arm64-apple-ios17.0 \
            -sdk "${iphoneos_sdk}" \
            "${swift_sources[@]}" > ci-results/swift-parse.log 2>&1
          status_swift_parse=$?

          "${swiftc_bin}" -parse \
            -D USE_STABLE_DIFFUSION_CPP \
            -import-objc-header LocalDiffusion/App/LocalDiffusion-Bridging-Header.h \
            -target arm64-apple-ios17.0 \
            -sdk "${iphoneos_sdk}" \
            "${swift_sources[@]}" > ci-results/swift-parse-native.log 2>&1
          status_swift_parse_native=$?

          if [[ "${status_native_backend_asset}" -eq 0 ]]; then
            ./Scripts/check-native-backend.sh > ci-results/native-backend.log 2>&1
            status_native_backend=$?

            rm -rf "${RESULT_BUNDLE_PATH}"
            xcodebuild \
              -project "${PROJECT}" \
              -scheme "${SCHEME}" \
              -configuration "${CONFIGURATION}" \
              -sdk iphoneos \
              -destination "${DESTINATION}" \
              -derivedDataPath "${DERIVED_DATA_PATH}" \
              -resultBundlePath "${RESULT_BUNDLE_PATH}" \
              CODE_SIGNING_ALLOWED=NO \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGN_IDENTITY= \
              build > "${BUILD_LOG_PATH}" 2>&1
            status_build=$?
          else
            echo "Skipped native backend preflight because native asset validation outcome was ${NATIVE_BACKEND_ASSET_OUTCOME}." > ci-results/native-backend.log
            echo "Skipped xcodebuild because native asset validation outcome was ${NATIVE_BACKEND_ASSET_OUTCOME}." > "${BUILD_LOG_PATH}"
            status_native_backend=1
            status_build=1
          fi

          export STATUS_GIT_DIFF="${status_git_diff}"
          export STATUS_PLUTIL="${status_plutil}"
          export STATUS_NATIVE_BACKEND_ASSET="${status_native_backend_asset}"
          export STATUS_SWIFT_PARSE="${status_swift_parse}"
          export STATUS_SWIFT_PARSE_NATIVE="${status_swift_parse_native}"
          export STATUS_NATIVE_BACKEND="${status_native_backend}"
          export STATUS_BUILD="${status_build}"

          python3 - <<'PY'
          import datetime
          import html
          import json
          import os
          import pathlib
          import xml.etree.ElementTree as ET

          results = [
              ("git-diff-check", "ci-results/git-diff-check.log", int(os.environ["STATUS_GIT_DIFF"])),
              ("plutil", "ci-results/plutil.log", int(os.environ["STATUS_PLUTIL"])),
              ("native-backend-asset", os.environ["NATIVE_BACKEND_ASSET_LOG_PATH"], int(os.environ["STATUS_NATIVE_BACKEND_ASSET"])),
              ("swift-parse", "ci-results/swift-parse.log", int(os.environ["STATUS_SWIFT_PARSE"])),
              ("swift-parse-native", "ci-results/swift-parse-native.log", int(os.environ["STATUS_SWIFT_PARSE_NATIVE"])),
              ("native-backend", "ci-results/native-backend.log", int(os.environ["STATUS_NATIVE_BACKEND"])),
              ("xcodebuild", os.environ["BUILD_LOG_PATH"], int(os.environ["STATUS_BUILD"])),
          ]

          static_failed = any(status != 0 for name, _, status in results if name != "xcodebuild")
          build_failed = int(os.environ["STATUS_BUILD"]) != 0

          manifest = {
              "version": os.environ["VERSION"],
              "branch": os.environ["GITHUB_REF_NAME"],
              "commitSha": os.environ["GITHUB_SHA"],
              "shortSha": os.environ["SHORT_SHA"],
              "runId": os.environ["GITHUB_RUN_ID"],
              "runAttempt": os.environ["GITHUB_RUN_ATTEMPT"],
              "workflowName": os.environ["GITHUB_WORKFLOW"],
              "createdAt": datetime.datetime.utcnow().replace(microsecond=0).isoformat() + "Z",
              "projectName": os.environ["PROJECT_NAME"],
              "scheme": os.environ["SCHEME"],
              "destination": os.environ["DESTINATION"],
              "resultBundlePath": os.environ["RESULT_BUNDLE_PATH"],
              "junitPath": os.environ["JUNIT_PATH"],
              "buildLogPath": os.environ["BUILD_LOG_PATH"],
              "failureSummaryPath": os.environ["FAILURE_SUMMARY_PATH"],
              "nativeBackendAssetMetadataPath": os.environ["NATIVE_BACKEND_ASSET_METADATA"],
              "nativeBackendAssetLogPath": os.environ["NATIVE_BACKEND_ASSET_LOG_PATH"],
              "nativeBackendAssetOutcome": os.environ["NATIVE_BACKEND_ASSET_OUTCOME"],
              "nativeBackendAssetExpectedSha256": os.environ["NATIVE_BACKEND_ASSET_EXPECTED_SHA"],
              "nativeBackendAssetActualSha256": os.environ["NATIVE_BACKEND_ASSET_ACTUAL_SHA"],
              "staticChecksOutcome": "failure" if static_failed else "success",
              "buildOutcome": "failure" if build_failed else "success",
              "testOutcome": "skipped",
              "projectSpecificReports": [
                  "ci-results/git-diff-check.log",
                  "ci-results/plutil.log",
                  "ci-results/native-backend-asset.log",
                  "ci-results/swift-parse.log",
                  "ci-results/swift-parse-native.log",
                  "ci-results/native-backend.log",
                  "ci-results/native-backend-restore.log",
                  "ci-results/xcode-version.txt",
              ],
              "checks": [
                  {"name": name, "logPath": log_path, "exitCode": status}
                  for name, log_path, status in results
              ],
          }
          pathlib.Path(os.environ["MANIFEST_PATH"]).write_text(
              json.dumps(manifest, indent=2, ensure_ascii=False) + "\n",
              encoding="utf-8",
          )

          testsuite = ET.Element(
              "testsuite",
              {
                  "name": "LocalDiffusion CI",
                  "tests": str(len(results)),
                  "failures": str(sum(1 for _, _, status in results if status != 0)),
                  "skipped": "0",
              },
          )
          for name, log_path, status in results:
              testcase = ET.SubElement(testsuite, "testcase", {"name": name})
              if status != 0:
                  failure = ET.SubElement(testcase, "failure", {"message": f"exit {status}"})
                  failure.text = f"{name} failed with exit {status}; see {log_path}"
          ET.ElementTree(testsuite).write(
              os.environ["JUNIT_PATH"],
              encoding="utf-8",
              xml_declaration=True,
          )

          summary_lines = [
              "# CI Failure Summary",
              "",
              f"- Version: `{html.escape(os.environ['VERSION'])}`",
              f"- Branch: `{html.escape(os.environ['GITHUB_REF_NAME'])}`",
              f"- Commit: `{html.escape(os.environ['GITHUB_SHA'])}`",
              f"- Run: `{html.escape(os.environ['GITHUB_RUN_ID'])}` attempt `{html.escape(os.environ['GITHUB_RUN_ATTEMPT'])}`",
              "",
              "## Checks",
              "",
          ]
          for name, log_path, status in results:
              state = "PASS" if status == 0 else "FAIL"
              summary_lines.append(f"- {state}: `{name}` exit `{status}`; log `{log_path}`")
          if all(status == 0 for _, _, status in results):
              summary_lines.extend(["", "All configured checks passed."])
          else:
              summary_lines.extend(["", "One or more checks failed. Review the logs listed above."])
          pathlib.Path(os.environ["FAILURE_SUMMARY_PATH"]).write_text(
              "\n".join(summary_lines) + "\n",
              encoding="utf-8",
          )
          PY

          if [[ "${status_git_diff}" -ne 0 || "${status_plutil}" -ne 0 || "${status_native_backend_asset}" -ne 0 || "${status_swift_parse}" -ne 0 || "${status_swift_parse_native}" -ne 0 || "${status_native_backend}" -ne 0 || "${status_build}" -ne 0 ]]; then
            exit 1
          fi

      - name: Upload CI results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: localdiffusion-ci-${{ env.VERSION }}-${{ env.BRANCH_SLUG }}-${{ env.SHORT_SHA }}-run${{ github.run_id }}-attempt${{ github.run_attempt }}
          path: ci-results
          if-no-files-found: error
          retention-days: 14
